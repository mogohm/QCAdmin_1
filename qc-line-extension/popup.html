<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<style>
  body { width: 280px; padding: 16px; font-family: sans-serif; font-size: 13px; margin: 0; }
  h2 { margin: 0 0 12px; font-size: 15px; color: #1d4ed8; }
  label { display: block; margin-bottom: 4px; color: #555; font-size: 12px; }
  input, select { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
  button { width: 100%; padding: 8px; background: #2196f3; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  button:hover { background: #1976d2; }
  #status { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 12px; display: none; }
  .ok { background: #f0fdf4; color: #16a34a; display: block !important; }
  .err { background: #fef2f2; color: #dc2626; display: block !important; }
  .divider { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }
  #adminList { display: none; }
</style>
</head>
<body>
<h2>⚙️ QC Admin Logger</h2>

<label>URL ของ QC Admin (ไม่มี / ท้าย)</label>
<input id="apiUrl" type="url" placeholder="https://your-app.vercel.app" />

<label>ADMIN_API_KEY</label>
<input id="apiKey" type="password" placeholder="ใส่ key เดียวกับที่ตั้งใน Vercel" />

<hr class="divider">

<label>แอดมินที่ใช้คอมนี้</label>
<select id="adminId">
  <option value="">— กด Load ก่อน —</option>
</select>

<button id="loadBtn" style="background:#6b7280;margin-bottom:8px">🔄 Load รายชื่อ Admin</button>
<button id="saveBtn">💾 บันทึกการตั้งค่า</button>

<div id="status"></div>

<script src="popup.js"></script>
</body>
</html>
